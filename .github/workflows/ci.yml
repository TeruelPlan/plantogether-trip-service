name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run unit tests
        run: mvn -s .settings.xml --batch-mode test
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - name: Run integration tests
        run: mvn -s .settings.xml --batch-mode verify -Dsurefire.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7