name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run unit tests
        run: mvn --batch-mode test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: mvn --batch-mode verify -Dsurefire.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/teruelplan/plantogether-trip-service:${{ steps.tag.outputs.IMAGE_TAG }}
            ghcr.io/teruelplan/plantogether-trip-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: TeruelPlan/infra
          token: ${{ secrets.INFRA_WRITE_TOKEN }}
          path: infra-repo

      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Update Helm image tag
        run: |
          yq e '.image.tag = "${{ steps.tag.outputs.IMAGE_TAG }}"' -i \
            infra-repo/helm/values/app/trip-service.yaml

      - name: Push Helm update
        run: |
          cd infra-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values/app/trip-service.yaml
          git commit -m "chore(helm): update trip-service image tag to ${{ steps.tag.outputs.IMAGE_TAG }}"
          git push
